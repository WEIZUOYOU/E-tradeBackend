server:
  port: 8080

spring:
  datasource:
    # 补充了 characterEncoding 以防止中文存入数据库乱码
    url: jdbc:mysql://localhost:3306/E_tradeDB?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: your_password # 确保这是你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB # 建议 request 稍微大一点，因为多图上传总和会超过 10MB

# 自定义配置
file:
  # 建议使用外部相对路径。项目启动时，会在项目根目录下自动创建 uploads 文件夹
  # 这样打成 jar 包运行也能正常工作
  upload-dir: ./uploads/