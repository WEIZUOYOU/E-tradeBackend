server:
  port: 8080
  address: 0.0.0.0
  servlet:
    session:
      timeout: 86400s  # Session 超时时间设置为1天
      cookie:
        max-age: 86400s  # Cookie 有效期设置为1天
        http-only: true  # 防止 XSS 攻击
        same-site: Lax   # 允许跨站请求携带 Cookie

spring:
  datasource:
    # 补充了 characterEncoding 以防止中文存入数据库乱码
    url: jdbc:mysql://localhost:3306/E_tradeDB?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: W123456 # 确保这是你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB # 建议 request 稍微大一点，因为多图上传总和会超过 10MB

  session:
    store-type: servlet  # 使用 servlet 容器的 session 存储

# 自定义配置
file:
  # 使用 ${user.dir} 动态获取项目根目录，保证无论在哪启动都保存到项目根目录下的 uploads 文件夹
  upload-dir: ${user.dir}/uploads

app:
  adminIds: 1              # 管理员用户ID，多个用逗号分隔，例如 "1,2,3"